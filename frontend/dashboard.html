<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Dataset Workspace</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="styles.css?v=2">
  <script src="sync.js"></script>
</head>

<body style="background: var(--bg);">

  <!-- Brand Header -->
  <header
    style="background: var(--panel); border-bottom: 1px solid var(--line); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
    <div style="display: flex; align-items: center; gap: 15px;">
      <img src="logo.png" alt="Logo" style="height: 32px;">
      <h1 style="font-size: 1.2rem; font-weight: 700; margin: 0; color: var(--ink);">Metrics Dashboard</h1>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
      <a href="app.html" style="text-decoration: none;">
        <button class="primary" style="padding: 8px 16px; border-radius: 6px;">← Back</button>
      </a>
    </div>
  </header>

  <main class="dashboard-container">
    <div class="dashboard-header">
      <div>
        <p class="eyebrow">Overview</p>
        <h1>Project Metrics</h1>
      </div>
    </div>

    <div class="metrics-grid">
      <!-- Card 1: Images -->
      <div class="metric-card" data-metric="images">
        <div class="metric-icon">🖼️</div>
        <h3>Loaded Images</h3>
        <p class="metric-value" id="valImages">0</p>
      </div>

      <!-- Card 2: Annotations -->
      <div class="metric-card" data-metric="annotations">
        <div class="metric-icon">✏️</div>
        <h3>Total Annotations</h3>
        <p class="metric-value" id="valAnnotations">0</p>
      </div>

      <!-- Card 3: Classes -->
      <div class="metric-card" data-metric="classes">
        <div class="metric-icon">🏷️</div>
        <h3>Classes Created</h3>
        <p class="metric-value" id="valClasses">0</p>
      </div>

      <!-- Card 4: Team Members -->
      <div class="metric-card" data-metric="team">
        <div class="metric-icon">👥</div>
        <h3>Team Members</h3>
        <p class="metric-value" id="valTeam">0</p>
      </div>

      <!-- Card 5: Tasks -->
      <div class="metric-card" data-metric="tasks">
        <div class="metric-icon">📋</div>
        <h3>Tasks Assigned</h3>
        <p class="metric-value" id="valTasks">0</p>
      </div>
    </div>

    <div class="dashboard-header" style="margin-top: 40px; border-top: 1px solid var(--line); padding-top: 20px;">
      <div>
        <p class="eyebrow">Projects</p>
        <h2>Project Matrices</h2>
      </div>
    </div>
    <div
      style="background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 20px; overflow-x: auto;">
      <table style="width: 100%; min-width: 600px; text-align: left; border-collapse: collapse;">
        <thead>
          <tr style="border-bottom: 2px solid var(--line);">
            <th style="padding: 10px; color: var(--muted);">Project Name</th>
            <th style="padding: 10px; color: var(--muted);">Assignee</th>
            <th style="padding: 10px; color: var(--muted);">Status</th>
            <th style="padding: 10px; color: var(--muted);">Progress</th>
            <th style="padding: 10px; color: var(--muted);">Completed</th>
            <th style="padding: 10px; color: var(--muted);">Total Tasks</th>
            <th style="padding: 10px; color: var(--muted);">Comments</th>
            <th style="padding: 10px; color: var(--muted);">Actions</th>
          </tr>
        </thead>
        <tbody id="projectsMatrixBody">
          <!-- Projects injected via JS -->
        </tbody>
      </table>
    </div>

  </main>

  <!-- Modal Overlay -->
  <div id="metricModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Details</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <ul class="modal-list" id="modalList">
          <!-- Items injected via JS -->
        </ul>
      </div>
    </div>
  </div>

  <script>
    async function apiFetch(url, options = {}) {
      const token = localStorage.getItem('dataset_token');
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
      return fetch(url, options);
    }

    document.addEventListener("DOMContentLoaded", async () => {

      // Load Annotation Data
      const storageKey = 'image-annotation-mvp-v1';
      const savedData = localStorage.getItem(storageKey);

      let numImages = 0;
      let numAnnotations = 0;
      let numClasses = 0;

      let payload = {};

      function savePayload() {
        localStorage.setItem(storageKey, JSON.stringify(payload));
        if (payload.labels) {
          numClasses = payload.labels.length;
          document.getElementById('valClasses').textContent = numClasses;
        }
        if (payload.annotations) {
          numAnnotations = payload.annotations.length;
          document.getElementById('valAnnotations').textContent = numAnnotations;
        }
      }

      if (savedData) {
        try {
          payload = JSON.parse(savedData);
          if (payload.image) numImages = 1; // MVP currently only stores 1 image at a time
          if (payload.annotations && Array.isArray(payload.annotations)) {
            numAnnotations = payload.annotations.length;
          }
          if (payload.labels && Array.isArray(payload.labels)) {
            numClasses = payload.labels.length;
          }
        } catch (e) {
          console.error("Error parsing metrics", e);
        }
      }

      // Load Team Data, Tasks, Projects & Metrics in Parallel
      let team = [];
      let tasks = [];
      let projects = [];
      let batchMetrics = {};
      const username = localStorage.getItem('dataset_username') || '';

      try {
        const [teamRes, tasksRes, projectsRes, metricsRes] = await Promise.all([
          apiFetch('/api/team'),
          apiFetch('/api/tasks?include_annotations=false'),
          apiFetch(`/api/projects?creator=${encodeURIComponent(username)}`),
          apiFetch(`/api/projects/metrics/batch?creator=${encodeURIComponent(username)}`)
        ]);

        if (teamRes.ok) team = await teamRes.json();
        if (tasksRes.ok) tasks = await tasksRes.json();
        if (projectsRes.ok) projects = await projectsRes.json();
        if (metricsRes.ok) batchMetrics = await metricsRes.json();
      } catch (e) {
        console.error("Failed to fetch dashboard data", e);
      }

      // Update DOM
      document.getElementById('valImages').textContent = numImages;
      document.getElementById('valAnnotations').textContent = numAnnotations;
      document.getElementById('valClasses').textContent = numClasses;
      document.getElementById('valTeam').textContent = team.length;
      document.getElementById('valTasks').textContent = tasks.length;

      // Modal Logic
      const modal = document.getElementById('metricModal');
      const modalTitle = document.getElementById('modalTitle');
      const modalList = document.getElementById('modalList');
      const modalClose = document.getElementById('modalClose');

      function openModal(title, itemsHTML) {
        modalTitle.textContent = title;
        modalList.innerHTML = itemsHTML || '<li class="modal-list-item"><span style="text-align:center;">No data available</span></li>';
        modal.classList.add('is-active');
      }

      modalClose.addEventListener('click', () => {
        modal.classList.remove('is-active');
      });

      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('is-active');
      });


      // Load Project Matrices
      try {
        if (projects) {
          const tbody = document.getElementById('projectsMatrixBody');

          const renderTable = () => {
            tbody.innerHTML = '';
            if (projects.length === 0) {
              tbody.innerHTML = '<tr><td colspan="7" style="padding: 10px; text-align: center; color: var(--muted);">No projects found</td></tr>';
              return;
            }
            
            projects.forEach(project => {
              const m = batchMetrics[project.id] || {};
              const progress = m.progress || 0;
              const completed = m.completed || 0;
              const total = m.total || 0;
              const comments = m.comments || 0;
              
              const tr = document.createElement('tr');
              tr.style.borderBottom = '1px solid var(--line)';
              
              const renderRow = () => {
                const escapeHTML = (str) => String(str).replace(/[&<>'"]/g, match => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[match]));
                const assigneeHtml = `<span style="font-size: 0.85rem; color: var(--ink);">${project.assignee ? escapeHTML(project.assignee) : '<span style="color: var(--muted);">Unassigned</span>'}</span>`;
                
                tr.innerHTML = `
                  <td style="padding: 10px; font-weight: 500;">
                    <a href="project_details.html?id=${project.id}" style="color: #3b82f6; text-decoration: underline;">
                      ${escapeHTML(project.name)}
                    </a>
                  </td>
                  <td style="padding: 10px;">${assigneeHtml}</td>
                  <td style="padding: 10px;">
                    <span style="font-size: 0.75rem; padding: 4px 8px; border-radius: 12px; background: rgba(0,0,0,0.05); color: var(--ink); white-space: nowrap;">
                      ${escapeHTML(project.status || 'New')}
                    </span>
                  </td>
                  <td style="padding: 10px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                      <div style="flex: 1; height: 8px; background: var(--line); border-radius: 4px; overflow: hidden;">
                        <div style="height: 100%; width: ${progress}%; background: var(--accent);"></div>
                      </div>
                      <span style="font-size: 0.85rem; font-weight: 600;">${progress}%</span>
                    </div>
                  </td>
                  <td style="padding: 10px;">${completed}</td>
                  <td style="padding: 10px;">${total}</td>
                  <td style="padding: 10px;">
                    <span style="background: rgba(15, 139, 141, 0.1); color: #0f8b8d; padding: 2px 8px; border-radius: 12px; font-weight: 600; font-size: 0.8rem;">
                      💬 ${comments}
                    </span>
                  </td>
                  <td style="padding: 10px;">
                    <div style="display: flex; gap: 8px;">
                      <button type="button" class="edit-project-btn" style="padding: 6px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; color: var(--ink);" title="Edit Project">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
                      </button>
                      <button type="button" class="delete-project-btn" style="padding: 6px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; color: #ff6b6b;" title="Delete Project">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                      </button>
                    </div>
                  </td>
                `;
                
                tr.querySelector('.edit-project-btn').addEventListener('click', () => {
                  const assigneeOptions = team.map(m => `<option value="${escapeHTML(m.name)}" ${project.assignee === m.name ? 'selected' : ''}>${escapeHTML(m.name)}</option>`).join('');
                  tr.innerHTML = `
                    <td colspan="8" style="padding: 10px;">
                      <form class="edit-project-form" style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center;" onsubmit="event.preventDefault();">
                        <input type="text" class="edit-project-name" value="${escapeHTML(project.name)}" required style="flex: 1; min-width: 120px; padding: 6px; font-size: 0.85rem; border: 1px solid var(--line); border-radius: 4px; background: rgba(0,0,0,0.05); color: var(--ink);">
                        <select class="edit-project-assignee" style="width: 120px; padding: 6px; border: 1px solid var(--line); border-radius: 4px; font-size: 0.85rem; background: rgba(0,0,0,0.05); color: var(--ink);">
                          <option value="" ${!project.assignee ? 'selected' : ''}>Unassigned</option>
                          ${assigneeOptions}
                        </select>
                        <select class="edit-project-status" style="width: 100px; padding: 6px; border: 1px solid var(--line); border-radius: 4px; font-size: 0.85rem; background: rgba(0,0,0,0.05); color: var(--ink);">
                          <option value="Preparing" ${project.status === 'Preparing' ? 'selected' : ''}>Preparing</option>
                          <option value="In Progress" ${project.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                          <option value="Completed" ${project.status === 'Completed' ? 'selected' : ''}>Completed</option>
                        </select>
                        <button type="submit" class="primary" style="padding: 6px 12px; font-size: 0.85rem; border-radius: 4px;">Save</button>
                        <button type="button" class="cancel-edit-btn" style="padding: 6px 12px; font-size: 0.85rem; background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; cursor: pointer;">Cancel</button>
                      </form>
                    </td>
                  `;
                  
                  const form = tr.querySelector('.edit-project-form');
                  const nameInput = tr.querySelector('.edit-project-name');
                  const statusInput = tr.querySelector('.edit-project-status');
                  const assigneeInput = tr.querySelector('.edit-project-assignee');
                  nameInput.focus();
                  
                  const finishEdit = async (save) => {
                    if (save) {
                      const newName = nameInput.value.trim();
                      const newStatus = statusInput.value;
                      const newAssignee = assigneeInput.value;
                      if (newName) {
                        try {
                          const res = await apiFetch('/api/projects/update', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ id: project.id, name: newName, status: newStatus, assignee: newAssignee })
                          });
                          if (res.ok) {
                            project.name = newName;
                            project.status = newStatus;
                            project.assignee = newAssignee;
                          } else {
                            alert('Failed to update project.');
                          }
                        } catch(e) {
                          alert('Failed to update project.');
                        }
                      }
                    }
                    renderRow();
                  };
                  
                  form.addEventListener('submit', () => finishEdit(true));
                  tr.querySelector('.cancel-edit-btn').addEventListener('click', () => finishEdit(false));
                });
                
                tr.querySelector('.delete-project-btn').addEventListener('click', async () => {
                  if (confirm(`Delete project "${project.name}"? This action cannot be undone.`)) {
                    try {
                      const res = await apiFetch(`/api/projects/${project.id}`, { method: 'DELETE' });
                      if (res.ok) {
                        projects = projects.filter(p => p.id !== project.id);
                        renderTable();
                      } else {
                        alert('Failed to delete project.');
                      }
                    } catch(e) {
                      alert('Failed to delete project.');
                    }
                  }
                });
              };
              
              renderRow();
              tbody.appendChild(tr);
            });
          };
          renderTable();
        }
      } catch (e) {
        console.error("Failed to load project matrices", e);
      }

      // Card Click Listeners
      document.querySelectorAll('.metric-card').forEach(card => {
        card.addEventListener('click', () => {
          const metricType = card.getAttribute('data-metric');
          let itemsHTML = '';

          switch (metricType) {
            case 'images':
              if (payload.image) {
                itemsHTML = `<li class="modal-list-item"><strong>Base64 Image Data</strong><span>Present in memory</span></li>`;
              }
              openModal('🖼️ Loaded Images', itemsHTML);
              break;

            case 'annotations':
              if (payload.annotations && payload.annotations.length > 0) {
                itemsHTML = payload.annotations.map(a => `<li class="modal-list-item"><strong>${a.type}</strong><span>Class: ${a.label || 'None'}</span></li>`).join('');
              }
              openModal('✏️ Annotations Details', itemsHTML);
              break;

            case 'classes':
              let selectedClassIds = new Set();
              const renderClassesModal = () => {
                if (!payload.labels || payload.labels.length === 0) {
                  openModal('🏷️ Classes Created', '<li class="modal-list-item"><span style="text-align:center;">No classes defined</span></li>');
                  return;
                }
                
                modalList.innerHTML = `
                  <li class="modal-list-item" style="display:flex; justify-content:space-between; align-items:center; background: var(--panel-2); font-size: 0.85rem; padding: 6px 12px; position: sticky; top: -12px; z-index: 10; margin-top: -12px; margin-bottom: 8px;">
                    <label style="display:flex; align-items:center; gap: 8px; cursor: pointer; min-width: 0;">
                      <input type="checkbox" id="selectAllClasses" ${selectedClassIds.size > 0 && selectedClassIds.size === payload.labels.length ? 'checked' : ''}>
                      <strong>Select All</strong>
                    </label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                      <input type="color" id="bulkColorPicker" style="width: 20px; height: 20px; padding: 0; border: none; cursor: pointer;" title="Bulk edit color" value="#3b82f6">
                      <button id="bulkEditBtn" class="primary" style="padding: 2px 6px; font-size: 0.75rem; border: none; border-radius: 4px; ${selectedClassIds.size > 0 ? 'cursor:pointer;' : 'opacity: 0.5; pointer-events: none;'}" title="Apply color to selected">Bulk Edit</button>
                      <button id="bulkDeleteBtn" style="padding: 2px 6px; font-size: 0.75rem; background: #ef4444; color: white; border: none; border-radius: 4px; ${selectedClassIds.size > 0 ? 'cursor:pointer;' : 'opacity: 0.5; pointer-events: none;'}">Bulk Delete</button>
                    </div>
                  </li>
                `;

                // Add listeners to the bulk actions
                document.getElementById('selectAllClasses').addEventListener('change', (e) => {
                  if (e.target.checked) {
                    payload.labels.forEach(l => selectedClassIds.add(l.id));
                  } else {
                    selectedClassIds.clear();
                  }
                  renderClassesModal();
                });

                document.getElementById('bulkDeleteBtn').addEventListener('click', () => {
                  if (confirm(`Delete ${selectedClassIds.size} selected classes?`)) {
                    payload.labels = payload.labels.filter(l => !selectedClassIds.has(l.id));
                    if (payload.annotations) {
                      payload.annotations = payload.annotations.filter(a => !selectedClassIds.has(a.labelId));
                    }
                    
                    // Also delete from backend /api/labels route
                    selectedClassIds.forEach(id => {
                      apiFetch('/api/labels/' + id, { method: 'DELETE' }).catch(e => console.error(e));
                    });

                    selectedClassIds.clear();
                    savePayload();
                    renderClassesModal();
                  }
                });

                document.getElementById('bulkEditBtn').addEventListener('click', () => {
                  const newColor = document.getElementById('bulkColorPicker').value;
                  payload.labels.forEach(l => {
                    if (selectedClassIds.has(l.id)) {
                      l.color = newColor;
                    }
                  });
                  savePayload();
                  renderClassesModal();
                });

                payload.labels.forEach(l => {
                  const li = document.createElement('li');
                  li.className = 'modal-list-item';
                  li.style.display = 'flex';
                  li.style.justifyContent = 'space-between';
                  li.style.alignItems = 'center';
                  
                  const renderView = () => {
                    li.innerHTML = `
                      <strong style="display:flex;align-items:center;gap:8px;min-width:0;flex:1;">
                        <input type="checkbox" class="class-checkbox" ${selectedClassIds.has(l.id) ? 'checked' : ''} style="cursor: pointer; flex-shrink: 0;">
                        <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${l.color};flex-shrink:0;"></span>
                        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${l.name}</span>
                      </strong>
                      <div style="display: flex; gap: 8px; align-items: center; flex-shrink: 0;">
                        <svg class="edit-btn" style="cursor:pointer; width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; color: #6b7280;" title="Edit" viewBox="0 0 24 24">
                          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                        <svg class="delete-btn" style="cursor:pointer; width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; color: #ef4444;" title="Delete" viewBox="0 0 24 24">
                          <polyline points="3 6 5 6 21 6"></polyline>
                          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                          <line x1="10" y1="11" x2="10" y2="17"></line>
                          <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                      </div>
                    `;

                    li.querySelector('.class-checkbox').addEventListener('change', (e) => {
                      if (e.target.checked) {
                        selectedClassIds.add(l.id);
                      } else {
                        selectedClassIds.delete(l.id);
                      }
                      renderClassesModal();
                    });

                    
                    li.querySelector('.edit-btn').addEventListener('click', () => {
                      li.innerHTML = `
                        <form class="edit-class-form" style="display: flex; gap: 4px; width: 100%; align-items: center;" onsubmit="event.preventDefault();">
                          <input type="text" class="edit-class-name" value="${l.name}" required style="flex: 1; min-width: 0; padding: 2px 4px; font-size: 0.85rem;">
                          <input type="color" class="edit-class-color" value="${l.color}" style="width: 24px; height: 24px; padding: 0; border: none; flex-shrink: 0;">
                          <button type="submit" class="primary save-edit-btn" style="padding: 2px 6px; font-size: 0.75rem; border: none; border-radius: 4px; flex-shrink: 0;">Save</button>
                          <button type="button" class="cancel-edit-btn" style="padding: 2px 6px; font-size: 0.75rem; background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; flex-shrink: 0;">Cancel</button>
                        </form>
                      `;
                      const form = li.querySelector('.edit-class-form');
                      const nameInput = li.querySelector('.edit-class-name');
                      const colorInput = li.querySelector('.edit-class-color');
                      nameInput.focus();
                      
                      const finishEdit = (saveChanges) => {
                        if (saveChanges) {
                          const newName = nameInput.value.trim();
                          if (newName) {
                            l.name = newName;
                            l.color = colorInput.value;
                            savePayload();
                          }
                        }
                        renderView();
                      };
                      
                      form.addEventListener('submit', () => finishEdit(true));
                      li.querySelector('.cancel-edit-btn').addEventListener('click', () => finishEdit(false));
                    });
                    
                    li.querySelector('.delete-btn').addEventListener('click', () => {
                      if (confirm(`Delete class "${l.name}" and all its annotations?`)) {
                        payload.labels = payload.labels.filter(label => label.id !== l.id);
                        if (payload.annotations) {
                          payload.annotations = payload.annotations.filter(a => a.labelId !== l.id);
                        }
                        
                        // Also delete from backend /api/labels route
                        apiFetch('/api/labels/' + l.id, { method: 'DELETE' }).catch(e => console.error(e));

                        savePayload();
                        renderClassesModal();
                      }
                    });
                  };
                  
                  renderView();
                  modalList.appendChild(li);
                });
                
                modalTitle.textContent = '🏷️ Classes Created';
                modal.classList.add('is-active');
              };
              renderClassesModal();
              break;

            case 'team':
              if (team.length > 0) {
                itemsHTML = team.map(member => {
                  const secs = member.time_logged || 0;
                  const h = Math.floor(secs / 3600).toString().padStart(2, '0');
                  const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
                  const s = (secs % 60).toString().padStart(2, '0');
                  const formattedTime = `${h}:${m}:${s}`;

                  return `<li class="modal-list-item" style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>👤 ${member.name}</strong>
                    <span style="font-family: monospace; color: var(--accent); font-weight: bold; background: var(--panel-2); padding: 4px 8px; border-radius: 4px;">⏱️ ${formattedTime}</span>
                  </li>`;
                }).join('');
              }
              openModal('👥 Team Members', itemsHTML);
              break;

            case 'tasks':
              if (tasks.length > 0) {
                itemsHTML = tasks.map(task => `<li class="modal-list-item"><strong>${task.description}</strong><span>Assigned to: ${task.assignee}</span></li>`).join('');
              }
              openModal('📋 Assigned Tasks', itemsHTML);
              break;
          }
        });
      });
    });
  </script>
</body>

</html>
